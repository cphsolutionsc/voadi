services:
  db:
    image: postgres:16-alpine
    container_name: voadi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: voadi
      POSTGRES_USER: voadi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - voadi_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voadi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  voadi_db_data:
