<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOADI — 01 Launch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_frame.css">
<style>
.launch-screen {
  height: 100%;
  background: #ffffff;
  background-image:
    radial-gradient(ellipse at 50% 30%, rgba(217,119,6,0.06) 0%, transparent 55%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.launch-ornament {
  width: 44px;
  height: 44px;
  margin-bottom: 18px;
}

.launch-wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 900;
  color: #111827;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 10px;
}

.launch-wordmark em {
  color: #D97706;
  font-style: normal;
}

.launch-tagline {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #9CA3AF;
  margin-bottom: 52px;
}

.launch-bar-wrap {
  width: 64px;
  height: 2px;
  background: #E5E7EB;
  border-radius: 2px;
  overflow: hidden;
}

.launch-bar {
  width: 40%;
  height: 100%;
  background: #D97706;
  border-radius: 2px;
  animation: load 1.4s ease-in-out infinite;
}

@keyframes load {
  0%   { width: 0%; }
  60%  { width: 80%; }
  100% { width: 100%; }
}
</style>
</head>
<body>
<div class="canvas-label">VOADI — Launch</div>
<div class="phone">
  <div class="dynamic-island"></div>

  <!-- No status bar on launch -->
  <div style="height:59px; flex-shrink:0;"></div>

  <div class="screen" style="background:#ffffff; overflow:hidden;">
    <div class="launch-screen">
      <!-- Harp ornament (simplified) -->
      <svg class="launch-ornament" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 4 C10 4 6 14 6 22 C6 34 14 40 22 40" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 4 C34 4 38 14 38 22 C38 34 30 40 22 40" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="4" x2="22" y2="40" stroke="#D97706" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="14" y1="9" x2="14" y2="36" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
        <line x1="18" y1="6" x2="18" y2="38" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
        <line x1="26" y1="6" x2="26" y2="38" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
        <line x1="30" y1="9" x2="30" y2="36" stroke="#E5E7EB" stroke-width="1" stroke-linecap="round"/>
      </svg>

      <div class="launch-wordmark">V<em>O</em>ADI</div>
      <div class="launch-tagline">Voices of Africans Diaspora Ireland</div>
      <div class="launch-bar-wrap">
        <div class="launch-bar"></div>
      </div>
    </div>
  </div>

  <div class="home-indicator" style="background:#ffffff;">
    <div class="home-bar"></div>
  </div>
</div>
</body>
</html>
