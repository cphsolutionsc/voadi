<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOADI — 02 Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_frame.css">
<style>
.auth-brand { text-align:center; margin-bottom: 24px; }
.auth-brand-name { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:#111827; letter-spacing:-0.5px; }
.auth-brand-name em { color:#D97706; font-style:normal; }
.auth-brand-sub { font-size:10px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:#9CA3AF; margin-top:4px; }
.auth-heading { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#111827; margin-bottom:4px; }
.auth-sub { font-size:13px; color:#4B5563; margin-bottom:20px; }
.form-label { font-size:11px; font-weight:600; color:#4B5563; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:5px; display:block; }
.form-group { margin-bottom:12px; }
.form-input-wrap { position:relative; }
.form-input { width:100%; padding:13px 14px; border:1px solid #D1D5DB; border-radius:10px; font-size:14px; color:#111827; background:#ffffff; font-family:'Inter',sans-serif; outline:none; }
.form-input:focus { border-color:#D97706; box-shadow:0 0 0 3px rgba(217,119,6,0.12); }
.forgot { font-size:12px; color:#D97706; font-weight:600; text-align:right; display:block; margin-top:8px; margin-bottom:20px; }
.divider { display:flex; align-items:center; gap:10px; margin:16px 0; }
.divider-line { flex:1; height:1px; background:#E5E7EB; }
.divider-text { font-size:11px; color:#9CA3AF; font-weight:500; }
.link-row { text-align:center; font-size:13px; color:#4B5563; margin-top:16px; }
.link-row a { color:#111827; font-weight:700; }
.footer-copy { text-align:center; font-size:10px; color:#9CA3AF; margin-top:20px; }
</style>
</head>
<body>
<div class="canvas-label">VOADI — Sign In</div>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4" y="2" width="3" height="10" rx="1"/><rect x="8" y="0" width="3" height="12" rx="1"/><rect x="12" y="1" width="3" height="11" rx="1" opacity=".3"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="currentColor"><path d="M7.5 2.5C9.8 2.5 11.8 3.5 13.2 5L14.5 3.7C12.7 1.9 10.2 0.8 7.5 0.8 4.8 0.8 2.3 1.9 0.5 3.7L1.8 5C3.2 3.5 5.2 2.5 7.5 2.5Z" opacity=".4"/><path d="M7.5 5.5C9 5.5 10.4 6.1 11.4 7.1L12.7 5.8C11.3 4.5 9.5 3.7 7.5 3.7 5.5 3.7 3.7 4.5 2.3 5.8L3.6 7.1C4.6 6.1 6 5.5 7.5 5.5Z" opacity=".7"/><circle cx="7.5" cy="10" r="2"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="1" width="21" height="10" rx="3" stroke="currentColor" stroke-width="1" fill="none" opacity=".35"/><rect x="22" y="4" width="2" height="4" rx="1" opacity=".4"/><rect x="1.5" y="2.5" width="17" height="7" rx="2"/></svg>
    </div>
  </div>

  <div class="screen" style="background:#F9FAFB;">
    <div style="padding:24px 20px; display:flex; flex-direction:column; min-height:100%;">
      <div class="auth-brand">
        <div class="auth-brand-name">V<em>O</em>ADI</div>
        <div class="auth-brand-sub">Voices of Africans Diaspora Ireland</div>
      </div>

      <div class="auth-card">
        <div class="auth-heading">Sign in</div>
        <div class="auth-sub">Welcome back to your community.</div>

        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-input" type="email" placeholder="you@example.com" value="babatunde@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" placeholder="••••••••" value="password123" style="border-color:#D97706; box-shadow:0 0 0 3px rgba(217,119,6,0.12);">
          </div>
        </div>

        <a class="forgot">Forgot password?</a>

        <button class="btn-primary">Sign in</button>

        <div class="link-row">
          Don't have an account? <a>Join VOADI</a>
        </div>
      </div>

      <div class="footer-copy">© 2026 VOADI · Coalition of Africans Diaspora Ireland</div>
    </div>
  </div>

  <div class="home-indicator" style="background:#F9FAFB;">
    <div class="home-bar"></div>
  </div>
</div>
</body>
</html>
