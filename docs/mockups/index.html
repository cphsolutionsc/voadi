<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOADI Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f14; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 48px 32px; }
h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: #ffffff; margin-bottom: 6px; }
h1 em { color: #D97706; font-style: normal; }
.sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; overflow: hidden; text-decoration: none; transition: border-color 0.2s, transform 0.2s; }
.card:hover { border-color: rgba(217,119,6,0.5); transform: translateY(-2px); }
.card-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #D97706; padding: 12px 14px 4px; }
.card-title { font-size: 14px; font-weight: 600; color: #ffffff; padding: 0 14px 14px; }
.card-open { padding: 10px 14px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="sub">10 screens — open each to screenshot at 393 × 852px</div>
