<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#0A0404"/>

  <!-- The harp-V: scaled from viewBox "0 0 17 25" to fit inside 100x100 -->
  <!-- Original coords * ~3.5, centered: offset x+17, y+12 -->
  <g transform="translate(17, 10) scale(3.88)">
    <!-- Forepillar — left diagonal stroke -->
    <path d="M1.5 1.5 L8.5 23.5" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Neck — right diagonal, slight outward bow -->
    <path d="M15.5 1.5 C17.5 7 16 16 8.5 23.5" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Crown arc — amber -->
    <path d="M1.5 1.5 C3.5 -1.5 13.5 -1.5 15.5 1.5" stroke="#D97706" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Strings — amber -->
    <line x1="3.5"  y1="7.5"  x2="14.5" y2="7"   stroke="#D97706" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="5.5"  y1="13"   x2="13"   y2="13"   stroke="#D97706" stroke-width="1.4" stroke-linecap="round" opacity="0.95"/>
    <line x1="7.5"  y1="18.5" x2="11"   y2="18.5" stroke="#D97706" stroke-width="1.3" stroke-linecap="round" opacity="0.95"/>
  </g>
</svg>
